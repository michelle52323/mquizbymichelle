name: Deploy MQuiz App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- BACKEND PORTION ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build API
        run: dotnet build PlatformAPI/PlatformAPI.csproj --configuration Release

	- name: Create Mock Settings
        # This renames your test file to 'appsettings.json' so the API can find it
        run: cp PlatformAPI/appsettings.Test.json PlatformAPI/appsettings.json

      - name: Run xUnit Tests
        # We point this specifically to the Tests folder
        run: dotnet test PlatformAPI.Tests/PlatformAPI.Tests.csproj --configuration Release --verbosity normal

      # --- FRONTEND PORTION ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./FrontEnd
        run: npm install

      # - name: Run React Tests (Uncomment this once you have your tests!)
      #   working-directory: ./FrontEnd
      #   run: npm test -- --watchAll=false

      - name: Build React App
        working-directory: ./FrontEnd
        run: npm run build


      # --- DEPLOYMENT ---
      
      # 1. Deploy the Backend API
      - name: Publish API
        run: dotnet publish PlatformAPI/PlatformAPI.csproj --configuration Release --output ./publish

      # Then in the deploy step:
      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'quiz-app-web-app'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: './publish' # Point to the output of the publish command

      # 2. Deploy the React Front-End
      - name: Deploy Front-End to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Built into GitHub, no setup needed
          action: "upload"
          app_location: "./FrontEnd"          # Path to your source code
          output_location: "dist"             # Path to your built files (usually 'dist' or 'build')
